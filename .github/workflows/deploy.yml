name: Build & Deploy a Hostinger

# Compila en Linux (GitHub, con recursos de sobra) y sube SOLO el resultado ya
# armado por SSH. Hostinger NO compila nada → no revienta la memoria/procesos.
# Además reinicia la app (touch tmp/restart.txt) para que levante el build nuevo.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (standalone con binario Linux de better-sqlite3)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy por SSH (rsync del build) + reinicio
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_PATH: ${{ secrets.APP_PATH }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSHOPT="-i ~/.ssh/id_deploy -p $SSH_PORT -o StrictHostKeyChecking=accept-new"

          # El artefacto desplegable es todo .next/standalone/ (ya incluye
          # .next/static y public por scripts/postbuild.mjs). --delete limpia lo
          # viejo (evita chunks huérfanos), EXCLUYENDO datos/subidas/tmp.
          rsync -az --delete \
            --exclude 'data/' \
            --exclude 'public/uploads/' \
            --exclude 'tmp/' \
            -e "ssh $SSHOPT" \
            .next/standalone/ \
            "$SSH_USER@$SSH_HOST:$APP_PATH/"

          # Reinicio de la app (Passenger/Hostinger detecta este archivo).
          ssh $SSHOPT "$SSH_USER@$SSH_HOST" "mkdir -p '$APP_PATH/tmp' && touch '$APP_PATH/tmp/restart.txt'"
          rm -f ~/.ssh/id_deploy
