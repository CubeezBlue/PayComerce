name: Build & Deploy a Hostinger

# Compila en Linux (GitHub, recursos de sobra) y sube SOLO el build ya armado por
# SSH. Hostinger no compila nada y se reinicia solo (touch tmp/restart.txt).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar (standalone con binario Linux de better-sqlite3)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy por SSH (tar) + reinicio
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          APP_PATH: ${{ secrets.APP_PATH }}
        run: |
          set -e
          mkdir -p ~/.ssh
          # La llave privada va en el secreto SSH_KEY como base64 (una sola línea,
          # a prueba de copiar/pegar). Acá la decodificamos al archivo real.
          echo "${{ secrets.SSH_KEY }}" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSHOPT="-i ~/.ssh/id_deploy -p $SSH_PORT -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"
          # Chequeo de conexión (si esto falla, el problema es la SSH_KEY/secretos).
          ssh $SSHOPT "$SSH_USER@$SSH_HOST" "echo CONECTADO-DESDE-ACTIONS"

          # Empaqueta el build (.next/standalone incluye .next/static y public por
          # postbuild) y lo extrae en el servidor. Solo necesita tar+ssh en el
          # remoto (no rsync). Limpiamos .next viejo para no dejar chunks huérfanos,
          # sin tocar datos ni uploads (que viven fuera de APP_PATH).
          tar czf - -C .next/standalone . | ssh $SSHOPT "$SSH_USER@$SSH_HOST" \
            "cd '$APP_PATH' && rm -rf .next server.js && tar xzf - && mkdir -p tmp && touch tmp/restart.txt && echo DEPLOY-OK"
          rm -f ~/.ssh/id_deploy
